<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>UIGenie</title>
  <style>
    :root {
      --accent: #6C5CE7;
      --accent-dark: #5546d8;
      --accent-soft: rgba(108, 92, 231, 0.12);
      --bg: #f7f7fb;
      --surface: #ffffff;
      --surface-2: #f2f1f8;
      --border: #e4e2ef;
      --text: #1c1b29;
      --text-muted: #6b6880;
      --success: #2ecc71;
      --error: #e74c3c;
      --warning: #f39c12;
      --radius: 12px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #15141d;
        --surface: #1f1e2a;
        --surface-2: #262536;
        --border: #34324a;
        --text: #f1eff8;
        --text-muted: #a29fbd;
      }
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 340px;
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 4px 10px -4px rgba(108, 92, 231, 0.6);
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      line-height: 1.2;
    }

    header p {
      font-size: 11px;
      color: var(--text-muted);
      margin: 0;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    /* Mode picker */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 10px 6px;
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .mode-pill svg {
      width: 18px;
      height: 18px;
    }

    .mode-pill:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .mode-pill.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    /* Collapsible settings */
    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding: 8px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .settings-header svg {
      width: 14px;
      height: 14px;
      transition: transform 0.2s ease;
    }

    .settings-header.open svg {
      transform: rotate(180deg);
    }

    .settings-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .settings-panel.open {
      max-height: 260px;
      margin-top: 10px;
    }

    button#analyzeBtn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
    }

    button#analyzeBtn svg {
      width: 15px;
      height: 15px;
    }

    button#analyzeBtn:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    button#analyzeBtn:active:not(:disabled) {
      transform: scale(0.98);
    }

    button#analyzeBtn:disabled {
      opacity: 0.75;
      cursor: not-allowed;
    }

    button#analyzeBtn.loading #analyzeBtnIcon {
      display: none;
    }

    button#analyzeBtn.loading::before {
      content: '';
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: uig-spin 0.6s linear infinite;
    }

    @keyframes uig-spin {
      to { transform: rotate(360deg); }
    }

    #output {
      margin: 14px 0 0;
      padding: 10px;
      font-family: inherit;
      font-size: 12px;
      line-height: 1.45;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 90px;
      max-height: 240px;
      overflow: auto;
    }

    #output::-webkit-scrollbar {
      width: 8px;
    }

    #output::-webkit-scrollbar-track {
      background: transparent;
    }

    #output::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 100%;
      min-height: 70px;
      padding: 14px 10px;
      color: var(--text-muted);
      text-align: center;
      font-size: 12px;
    }

    .empty-state svg {
      width: 26px;
      height: 26px;
      opacity: 0.5;
    }

    footer {
      text-align: center;
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">UI</div>
    <div>
      <h1>UIGenie</h1>
      <p>Design intel for AI agents</p>
    </div>
  </header>

  <div class="field">
    <label>Analysis mode</label>
    <div class="mode-grid" id="modeGrid">
      <button type="button" class="mode-pill active" data-mode="fullCopy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="13" height="13" rx="2"/><path d="M20 9v9a2 2 0 0 1-2 2H9"/></svg>
        <span>Full Copy</span>
      </button>
      <button type="button" class="mode-pill" data-mode="inspire">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a6 6 0 0 0-4 10.4c.6.6 1 1.4 1 2.3V16h6v-1.3c0-.9.4-1.7 1-2.3A6 6 0 0 0 12 2Z"/></svg>
        <span>Inspire</span>
      </button>
      <button type="button" class="mode-pill" data-mode="themeExtract">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 0 20c1.1 0 2-.9 2-2 0-.5-.2-1-.5-1.4-.3-.4-.5-.8-.5-1.3 0-1 .8-1.8 1.8-1.8H17a3 3 0 0 0 3-3c0-5-3.6-9-8-9Z"/><circle cx="7.5" cy="10.5" r="1.2" fill="currentColor" stroke="none"/><circle cx="11" cy="7" r="1.2" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        <span>UI Theme</span>
      </button>
      <button type="button" class="mode-pill" data-mode="designMd">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2h6l6 6v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>
        <span>DESIGN.md</span>
      </button>
    </div>
  </div>

  <div class="settings-header" id="settingsToggle">
    <span>API Key &amp; Settings</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="settings-panel" id="settingsPanel">
    <div class="field" style="margin-top: 10px;">
      <label for="apiKey">Gemini API key</label>
      <input type="password" id="apiKey" placeholder="Enter your API key">
    </div>
    <div class="field">
      <label for="urlInput">Website URL (optional)</label>
      <input type="text" id="urlInput" placeholder="Defaults to current tab">
    </div>
  </div>

  <button id="analyzeBtn">
    <svg id="analyzeBtnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span id="analyzeBtnLabel">Analyze</span>
  </button>

  <!-- this is use to check the response, it will later set as an alert to see whats actually happening, and it also increase user experience -->
  <div id="output">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <p>Choose a mode and hit Analyze to see results here.</p>
    </div>
  </div>

  <footer>Made with ❤️ by Mysia</footer>

  <script src="popup.js"></script>
</body>
</html>
